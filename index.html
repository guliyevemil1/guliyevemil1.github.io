  <h3>Crashing</h3>
  <p>The whole path is checked, not just the landing spot — a fast move can
  clip a wall mid-flight. Crashing stops the car dead at the wall and adds a
  time penalty equal to your impact speed, so easing into a wall costs little
  and slamming into one costs a lot.</p>
